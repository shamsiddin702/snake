<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Snake Pro: Wall Edition</title>
    <style>
        body {
            background: radial-gradient(circle, #1a1a2e, #16213e);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: white;
            font-family: 'Arial Rounded MT Bold', sans-serif;
        }

        #ui-container {
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            border: 2px solid #4ecca3;
        }

        .stats {
            font-size: 28px;
            color: #4ecca3;
            text-shadow: 0 0 10px rgba(78, 204, 163, 0.5);
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        select, button {
            padding: 10px 15px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            outline: none;
        }

        select { background: #eeeeee; color: #333; }
        button { background: #4ecca3; color: white; font-weight: bold; transition: 0.3s; }
        button:hover { background: #45b08c; transform: scale(1.05); }

        #game-area {
            position: relative;
            border: 8px solid #333;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        canvas {
            display: block;
            background-color: #AAD751;
        }

        #game-over {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <div class="stats">BALL: <span id="score">0</span></div>
        <div class="controls">
            <select id="speedLevel">
                <option value="250">Juda Sekin (Oson)</option>
                <option value="120" selected>O'rtacha (Normal)</option>
                <option value="60">Juda Qiyin (Pro)</option>
            </select>
            <button onclick="startGame()">O'yinni Boshlash</button>
        </div>
    </div>

    <div id="game-area">
        <canvas id="snakeGame" width="400" height="400"></canvas>
        <div id="game-over">
            <h1 style="color: #ff4d4d; font-size: 40px;">O'YIN TUGADI!</h1>
            <p id="final-score" style="font-size: 20px;"></p>
            <button onclick="startGame()">Qayta Urinish</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const speedSelect = document.getElementById("speedLevel");
        const gameOverScreen = document.getElementById("game-over");
        const finalScoreText = document.getElementById("final-score");

        const box = 20;
        let score, snake, food, d, nextD, gameLoop;
        const fruits = ["🍎", "🍐", "🍊", "🍋", "🍓", "🍒"];
        let currentFruit;

        function startGame() {
            if(gameLoop) clearInterval(gameLoop);
            gameOverScreen.style.display = "none";
            
            score = 0;
            scoreElement.innerText = score;
            d = "RIGHT";
            nextD = "RIGHT";
            
            snake = [
                {x: 10 * box, y: 10 * box},
                {x: 9 * box, y: 10 * box},
                {x: 8 * box, y: 10 * box}
            ];

            spawnFood();
            const ms = parseInt(speedSelect.value);
            gameLoop = setInterval(update, ms);
        }

        function spawnFood() {
            currentFruit = fruits[Math.floor(Math.random() * fruits.length)];
            food = {
                x: Math.floor(Math.random() * 19) * box,
                y: Math.floor(Math.random() * 19) * box
            };
            // Ovqat ilonchaning ustiga tushib qolmasligini tekshirish
            for(let part of snake) {
                if(part.x === food.x && part.y === food.y) spawnFood();
            }
        }

        document.addEventListener("keydown", (e) => {
            const key = e.keyCode;
            if(key == 37 && d != "RIGHT") nextD = "LEFT";
            else if(key == 38 && d != "DOWN") nextD = "UP";
            else if(key == 39 && d != "LEFT") nextD = "RIGHT";
            else if(key == 40 && d != "UP") nextD = "DOWN";
        });

        function update() {
            d = nextD;
            let headX = snake[0].x;
            let headY = snake[0].y;

            if(d == "LEFT") headX -= box;
            if(d == "UP") headY -= box;
            if(d == "RIGHT") headX += box;
            if(d == "DOWN") headY += box;

            // DEVORGA TEGISHNI TEKSHIRISH
            if(headX < 0 || headY < 0 || headX >= canvas.width || headY >= canvas.height || collision({x: headX, y: headY}, snake)) {
                endGame();
                return;
            }

            const newHead = {x: headX, y: headY};

            if(headX == food.x && headY == food.y) {
                score++;
                scoreElement.innerText = score;
                spawnFood();
            } else {
                snake.pop();
            }

            snake.unshift(newHead);
            draw();
        }

        function collision(head, array) {
            for(let i = 0; i < array.length; i++) {
                if(head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        function draw() {
            // Shaxmat foni
            for(let i=0; i<20; i++) {
                for(let j=0; j<20; j++) {
                    ctx.fillStyle = (i+j) % 2 == 0 ? "#AAD751" : "#A2D149";
                    ctx.fillRect(i*box, j*box, box, box);
                }
            }

            // Iloncha
            snake.forEach((part, i) => {
                ctx.fillStyle = (i === 0) ? "#4674E9" : "#578AFA";
                ctx.beginPath();
                ctx.roundRect(part.x + 1, part.y + 1, box - 2, box - 2, 6);
                ctx.fill();

                if(i === 0) { // Ko'zlar
                    ctx.fillStyle = "white";
                    ctx.beginPath();
                    ctx.arc(part.x + 6, part.y + 7, 3, 0, Math.PI*2);
                    ctx.arc(part.x + 14, part.y + 7, 3, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = "black";
                    ctx.beginPath();
                    ctx.arc(part.x + 6, part.y + 7, 1.5, 0, Math.PI*2);
                    ctx.arc(part.x + 14, part.y + 7, 1.5, 0, Math.PI*2);
                    ctx.fill();
                }
            });

            // Meva
            ctx.font = "16px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(currentFruit, food.x + box/2, food.y + box/2 + 2);
        }

        function endGame() {
            clearInterval(gameLoop);
            finalScoreText.innerText = "Sizning natijangiz: " + score;
            gameOverScreen.style.display = "flex";
        }
    </script>
</body>
</html>
